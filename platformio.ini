board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    gin66/FastAccelStepper @ ^0.31.0
    olikraus/U8g2 @ ^2.35.19
